{% extends "base.html" %} {% block title %}Sign Up{% endblock %} {% block content %}
<div class="auth-wrap">
  <div class="card-panel">
    <h3>Create account</h3>
    <p class="subtitle">Start tracking your expenses</p>
    <form method="POST">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          class="form-control {% if error_field == 'email' %}is-invalid{% endif %}"
          id="email"
          name="email"
          placeholder="Enter email"
          value="{{ email or '' }}"
        />
      </div>
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input
          type="text"
          class="form-control {% if error_field == 'firstName' %}is-invalid{% endif %}"
          id="firstName"
          name="firstName"
          placeholder="Enter first name"
          value="{{ first_name or '' }}"
        />
      </div>
      <div class="form-group">
        <label for="password1">Password</label>
        <input
          type="password"
          class="form-control {% if error_field == 'password' %}is-invalid{% endif %}"
          id="password1"
          name="password1"
          placeholder="Enter password"
        />
      </div>
      <div class="form-group">
        <label for="password2">Password (Confirm)</label>
        <input
          type="password"
          class="form-control {% if error_field == 'password' %}is-invalid{% endif %}"
          id="password2"
          name="password2"
          placeholder="Confirm password"
        />
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
  </div>
</div>
{% endblock %}
